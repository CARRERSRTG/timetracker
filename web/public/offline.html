<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Offline — Time Tracker</title>
<style>
  :root{--bg:#0f1420;--txt:#e7ecf7;--muted:#93a0bd;--accent:#4f7cff;--accent2:#2ee6a6;}
  @media (prefers-color-scheme: light){:root{--bg:#f4f6fb;--txt:#141b2b;--muted:#5a6a86;}}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;line-height:1.5}
  .wrap{max-width:340px}
  .logo{width:72px;height:72px;border-radius:18px;margin:0 auto 22px;
    background:linear-gradient(140deg,var(--accent),var(--accent2));position:relative;
    box-shadow:0 12px 30px rgba(79,124,255,.28)}
  .logo::after{content:"";position:absolute;inset:19px;border-radius:50%;border:3px solid #fff;
    border-top-color:transparent;border-right-color:transparent;transform:rotate(45deg)}
  h1{font-size:22px;margin:0 0 8px;letter-spacing:-.01em}
  p{color:var(--muted);font-size:15px;margin:0 0 22px}
  button{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px 22px;
    font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:filter .15s}
  button:active{filter:brightness(.9)}
  .hint{color:var(--muted);font-size:12.5px;margin-top:14px;min-height:1em}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo"></div>
    <h1 id="h">You're offline</h1>
    <p id="p">Time Tracker needs an internet connection to load. Check your Wi-Fi or mobile data and try again.</p>
    <button id="b" onclick="retry()">Try again</button>
    <div class="hint" id="hint"></div>
  </div>
  <script>
    var URL_ = "https://timetracker-pi-brown.vercel.app";
    var es = (navigator.language || "").toLowerCase().indexOf("es") === 0;
    if (es) {
      document.documentElement.lang = "es";
      document.getElementById("h").textContent = "Estás sin conexión";
      document.getElementById("p").textContent = "Time Tracker necesita conexión a internet para cargar. Revisa tu Wi-Fi o datos móviles e inténtalo de nuevo.";
      document.getElementById("b").textContent = "Reintentar";
    }
    function retry(){ location.href = URL_; }
    // auto-retry the moment the connection comes back
    window.addEventListener("online", retry);
    if (navigator.onLine) {
      document.getElementById("hint").textContent = es ? "Conexión detectada — toca Reintentar." : "Connection detected — tap Try again.";
    }
  </script>
</body>
</html>
