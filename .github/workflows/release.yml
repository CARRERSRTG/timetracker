name: Release desktop app

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'web/src/lib/version.js'
      - 'desktop/package.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Stop Defender from deleting the build tools
        shell: powershell
        run: |
          try {
            Set-MpPreference -DisableRealtimeMonitoring $true
            Add-MpPreference -ExclusionPath "${{ github.workspace }}"
            Add-MpPreference -ExclusionProcess "7za.exe"
            Add-MpPreference -ExclusionProcess "app-builder.exe"
          } catch { Write-Host "Defender tweak skipped: $_" }
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build --prefix web
        env:
          VITE_SUPABASE_URL: https://qklsxhzmbnglgzufdbmz.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGci••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••
      - run: npx electron-builder --win nsis --publish always
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
