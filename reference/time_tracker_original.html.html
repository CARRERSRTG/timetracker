<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Time Tracker</title>

<!--
========================================================================
  TIME TRACKER  (Upwork-style, no screenshots)
  Single file. React 18 (CDN) + Babel + Firebase compat.

  Roles: manager (admin) and employee.
  - Employee: tracks time (projects as buttons), sees their time, and to
    ADJUST / DELETE / ADD time sends a REQUEST that the manager approves.
  - Manager: approves/rejects requests, edits assignments, sets payment
    method, sees reports and marks weeks as PAID.
  - Configurable week start (default SATURDAY -> Friday).
  - Configurable currency (default USD) and TIME ZONE.

  BROWSER LIMITATION: the activity meter only counts keyboard/mouse while
  THIS window is focused. For full-system monitoring, wrap this in Electron.

  SETUP: 1) paste your firebaseConfig below  2) enable Authentication
  (email/password)  3) create Firestore and paste the rules below.
  The first registered user becomes the MANAGER.

  Suggested Firestore rules (Rules tab):
  ------------------------------------------------------------------------
  rules_version = '2';
  service cloud.firestore {
    match /databases/{database}/documents {
      function isSignedIn(){ return request.auth != null; }
      function isAdmin(){
        return isSignedIn() &&
          get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin';
      }
      match /users/{uid}{
        allow read: if isSignedIn();
        allow create: if isSignedIn() && request.auth.uid == uid;
        allow update: if isAdmin() || request.auth.uid == uid;
        allow delete: if isAdmin();
      }
      match /projects/{id}    { allow read: if isSignedIn(); allow write: if isAdmin(); }
      match /assignments/{id} { allow read: if isSignedIn(); allow write: if isAdmin(); }
      match /settings/{id}    { allow read: if isSignedIn(); allow write: if isAdmin(); }
      match /payrolls/{id}    { allow read: if isSignedIn(); allow write: if isAdmin(); }
      match /audit/{id}       { allow read, create: if isAdmin(); }
      match /screenshots/{id} { allow read: if isAdmin(); allow create: if isSignedIn(); }
      match /sessions/{id}{
        allow read: if isAdmin() || (isSignedIn() && resource.data.employeeUid == request.auth.uid);
        allow create: if isAdmin() || (isSignedIn() && request.resource.data.employeeUid == request.auth.uid);
        allow update: if isAdmin() || (isSignedIn() && resource.data.employeeUid == request.auth.uid);
        allow delete: if isAdmin();
      }
      match /requests/{id}{
        allow read: if isAdmin() || (isSignedIn() && resource.data.employeeUid == request.auth.uid);
        allow create: if isSignedIn() && request.resource.data.employeeUid == request.auth.uid;
        allow update: if isAdmin();
      }
    }
  }
  ------------------------------------------------------------------------
  (Quick test rules: allow read, write: if request.auth != null;)
========================================================================
-->

<style>
  :root{
    --bg:#0f1420; --panel:#171e2e; --panel2:#1e2740; --line:#2a3556;
    --txt:#e7ecf7; --muted:#93a0bd; --accent:#4f7cff; --accent2:#2ee6a6;
    --danger:#ff5a6a; --warn:#ffb020; --ok:#2ee6a6; --chip:#243052;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--txt);font-size:15px;line-height:1.45}
  .wrap{max-width:1100px;margin:0 auto;padding:18px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .between{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  .card h2{margin:0 0 12px;font-size:17px}
  label{display:block;font-size:13px;color:var(--muted);margin:8px 0 4px}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
       border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{resize:vertical;min-height:60px}
  button{cursor:pointer;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;
       background:var(--accent);color:#fff;transition:.15s filter}
  button:hover{filter:brightness(1.08)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .btn-ghost{background:var(--chip);color:var(--txt)}
  .btn-danger{background:var(--danger)}
  .btn-ok{background:var(--accent2);color:#08251b}
  .btn-warn{background:var(--warn);color:#3a2800}
  .btn-sm{padding:6px 10px;font-size:12.5px}
  .grid{display:grid;gap:12px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr 1fr}
  .g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:720px){.g2,.g3,.g4{grid-template-columns:1fr}}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .muted{color:var(--muted)}
  .chip{display:inline-block;background:var(--chip);border-radius:999px;padding:3px 10px;font-size:12px}
  .tag-admin{background:#3b2a63}
  .tag-emp{background:#1f3a5c}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .tabs button{background:var(--chip);color:var(--muted);font-weight:600;position:relative}
  .tabs button.active{background:var(--accent);color:#fff}
  .badge{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border-radius:999px;
       font-size:11px;min-width:18px;height:18px;line-height:18px;text-align:center;padding:0 5px}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);margin-bottom:6px}
  .brand{font-weight:800;font-size:18px;letter-spacing:.02em}
  .brand span{color:var(--accent)}
  .timer-big{font-size:52px;font-weight:800;font-variant-numeric:tabular-nums}
  .meter{display:flex;gap:3px;margin-top:6px}
  .meter i{flex:1;height:16px;border-radius:3px;background:var(--line)}
  .meter i.on{background:var(--accent2)}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .stat .n{font-size:22px;font-weight:800}
  .stat .l{font-size:12px;color:var(--muted)}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px}
  .pill.on{background:#12351f;color:#5df0a5}
  .pill.off{background:#3a1f27;color:#ff9aa6}
  .pill.wait{background:#3a3312;color:#ffd97a}
  .banner{padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:13.5px}
  .banner.warn{background:#3a2f12;color:#ffcf7a;border:1px solid #5a4415}
  .banner.info{background:#122a3a;color:#8fd0ff;border:1px solid #1c4763}
  .banner.err{background:#3a151b;color:#ff9aa6;border:1px solid #5a1f28}
  .banner.ok{background:#12351f;color:#7cf0b0;border:1px solid #1c5a37}
  .hr{height:1px;background:var(--line);margin:14px 0}
  .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
  .authbox{width:100%;max-width:420px}
  .small{font-size:12.5px}
  .right{text-align:right}
  .nowrap{white-space:nowrap}
  .link{background:none;color:var(--accent);padding:0;font-weight:600}
  .link:hover{text-decoration:underline;filter:none}
  .pbtns{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
  .pbtn{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:left;color:var(--txt)}
  .pbtn:hover{border-color:var(--accent)}
  .pbtn.sel{border-color:var(--accent);background:#1c2748;box-shadow:0 0 0 1px var(--accent) inset}
  .pbtn .pn{font-weight:700;font-size:14.5px}
  .pbtn .pm{font-size:12px;color:var(--muted);margin-top:3px}
  .box{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px}

  /* Sticky, swipeable navigation */
  html,body{overflow-x:hidden;-webkit-text-size-adjust:100%}
  .topbar{position:sticky;top:0;z-index:20;background:var(--bg)}
  .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;
        position:sticky;top:56px;z-index:15;background:var(--bg);scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tabs button{flex:0 0 auto}

  /* Touch-friendly + mobile layout */
  @media(max-width:720px){
    .wrap{padding:12px}
    .card{padding:14px;border-radius:12px}
    input,select,textarea{font-size:16px;padding:12px}   /* 16px avoids iOS zoom */
    button{padding:12px 16px}
    .btn-sm{padding:9px 12px;font-size:13px}
    .timer-big{font-size:44px}
    /* wide tables scroll horizontally inside their card instead of squishing */
    .card{overflow-x:auto}
    table{width:max-content;min-width:100%}
    /* stack the timer and make the main action a big full-width button */
    .tracker-controls{flex-direction:column;align-items:stretch;text-align:center}
    .tracker-controls .right{text-align:center}
    .tracker-controls .right button{width:100%;padding:16px;font-size:17px}
    .pbtns{grid-template-columns:1fr 1fr}
    .breakbtns button{flex:1}
    .topbar{top:0}
    .tabs{top:52px}
    .stat .n{font-size:20px}
  }
  @media(max-width:420px){
    .pbtns{grid-template-columns:1fr}
  }
  .shotgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:12px}
  .shot{display:block;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden;text-decoration:none;padding:6px}
  .shot img{width:100%;height:100px;object-fit:cover;border-radius:6px;display:block;background:#000}
  .rcpt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-start;justify-content:center;padding:16px;z-index:9998;overflow:auto}
  .rcpt-print{background:#fff;color:#111;border-radius:12px;padding:24px;max-width:520px;width:100%;margin-top:24px}
  .rcpt-print .muted{color:#666}
  .rcpt-print th{color:#666}
  .rcpt-print td,.rcpt-print th{border-bottom:1px solid #ddd}
  @media print{
    body>*{visibility:hidden}
    .rcpt-overlay,.rcpt-overlay *{visibility:visible}
    .rcpt-overlay{position:absolute;top:0;left:0;background:#fff;padding:0;display:block}
    .rcpt-print{margin:0;max-width:100%;border-radius:0}
    .rcpt-noprint,#bootstage,#bootmsg{display:none!important}
  }
</style>
</head>
